{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block meta_desc %}Sign in to your Quizify account to create and manage your quizzes.{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-bg-shape auth-bg-shape--1" aria-hidden="true"></div>
  <div class="auth-bg-shape auth-bg-shape--2" aria-hidden="true"></div>

  <div class="auth-card" data-animate="fade-up">

    <!-- Icon header -->
    <div class="auth-icon-wrap">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="10 17 15 12 10 7" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="15" y1="12" x2="3" y2="12" stroke="#4f8ef7" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>

    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your Quizify account.</p>

    <form method="POST" action="{{ url_for('login') }}" class="auth-form" novalidate id="loginForm">

      <div class="form-group">
        <label for="email">Email Address</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="3" stroke="#94a3b8" stroke-width="2"/>
            <path d="M2 8l10 6 10-6" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="email" id="email" name="email" placeholder="you@example.com"
                 autocomplete="email" required />
        </div>
        <span class="field-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrap">
          <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="3" y="11" width="18" height="11" rx="2" stroke="#94a3b8" stroke-width="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="Enter your password"
                 autocomplete="current-password" required />
        </div>
        <span class="field-error" id="passwordError"></span>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="loginSubmitBtn">
        Sign In
      </button>
    </form>

    <p class="auth-switch">
      Don't have an account?
      <a href="{{ url_for('register') }}">Create one for free</a>
    </p>

  </div>
</div>
{% endblock %}
